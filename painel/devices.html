<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LPSM BOX - Dispositivos</title>
  <style>
    body{margin:0;background:#03152f;color:#fff;font-family:Arial,Helvetica,sans-serif}
    .topbar{height:88px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:#08244b}
    .page{padding:18px;padding-bottom:100px}
    .hero{font-size:22px;font-weight:800;margin-bottom:14px}
    .toolbar{display:grid;grid-template-columns:1fr 180px 180px;gap:12px;margin-bottom:18px}
    input,select,button{height:52px;border:none;border-radius:12px;padding:0 14px;font-size:16px;box-sizing:border-box}
    input,select{background:#10274a;color:#fff}
    button{background:#2f76f3;color:#fff;font-weight:700;cursor:pointer}
    .list{display:flex;flex-direction:column;gap:14px}
    .card{background:#071b39;border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:18px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .name{font-size:22px;font-weight:800}
    .meta{font-size:15px;line-height:1.8;color:rgba(255,255,255,.82);margin-top:10px}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .small-danger{background:#922d2d}
    .small-dark{background:#333}
    .legend{margin:16px 0;color:#cdd8ea}
    .status-line{display:flex;align-items:center;gap:8px}
    .x-expired{display:inline-flex;width:18px;height:18px;border-radius:50%;background:#ff4040;color:#fff;align-items:center;justify-content:center;font-size:12px;font-weight:700}
    @media (max-width:900px){.toolbar{grid-template-columns:1fr}.actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="topbar">
    <b>LPSM BOX</b>
    <button onclick="window.location.href='dashboard.html'">Voltar</button>
  </div>

  <div class="page">
    <div class="hero">Gerenciar dispositivos/clientes</div>

    <div class="toolbar">
      <input id="search" placeholder="Buscar por nome ou código">
      <button onclick="addManualDevice()">ADD DISPOSITIVO</button>
      <button onclick="loadDevices()">ATUALIZAR</button>
    </div>

    <div class="legend">
      <div><span class="x-expired">×</span> vencido</div>
      <div><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#ff4040"></span> cliente sem entrar há 3 dias ou mais</div>
      <div><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#26d94c"></span> online</div>
    </div>

    <div id="list" class="list"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let DEVICES = [];
    let LAYOUTS = [];

    function render() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const box = document.getElementById('list');

      const items = DEVICES.filter(d => {
        return !q || (d.name || '').toLowerCase().includes(q) || (d.code || '').toLowerCase().includes(q);
      });

      if (!items.length) {
        box.innerHTML = '<div class="card">Nenhum dispositivo encontrado.</div>';
        return;
      }

      box.innerHTML = items.map(d => {
        const expired = isExpired(d);
        const statusHtml = expired
          ? '<span class="x-expired">×</span>'
          : getStatusDot(d);

        return `
          <div class="card">
            <div class="head">
              <div class="name">${statusHtml} ${safe(d.name, 'Sem nome')}</div>
              <div>${getStatusText(d)}</div>
            </div>

            <div class="meta">
              Código: ${safe(d.code)}<br>
              Expira: ${safe(formatDate(d.expiresAt))}<br>
              Último acesso: ${safe(formatDate(d.lastSeen))}<br>
              Layout atual: ${safe(d.layoutName || '-')}
            </div>

            <div style="margin-top:14px">
              <input id="name_${d.id}" value="${(d.name || '').replace(/"/g, '&quot;')}" placeholder="Nome do cliente" style="width:100%;margin-bottom:10px">
              <select id="layout_${d.id}" style="width:100%">
                <option value="">Sem layout</option>
                ${LAYOUTS.map(l => `<option value="${l.id}" ${d.layout === l.id ? 'selected' : ''}>${l.name}</option>`).join('')}
              </select>
            </div>

            <div class="actions">
              <button onclick="saveDevice('${d.id}')">Salvar layout</button>
              <button onclick="activateDeviceUi('${d.id}')">Ativar</button>
              <button class="small-dark" onclick="deactivateDeviceUi('${d.id}')">Desativar</button>
              <button class="small-danger" onclick="deleteDeviceUi('${d.id}')">Excluir</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function loadDevices() {
      try {
        [DEVICES, LAYOUTS] = await Promise.all([
          apiGet('/devices'),
          apiGet('/layouts')
        ]);
        render();
      } catch (e) {
        alert('Erro ao carregar dispositivos');
        console.error(e);
      }
    }

    async function addManualDevice() {
      const name = prompt('Nome do cliente:');
      if (!name) return;

      try {
        await apiPost('/devices', { name });
        alert('Dispositivo criado');
        loadDevices();
      } catch (e) {
        alert('Erro ao criar dispositivo');
        console.error(e);
      }
    }

    async function saveDevice(id) {
      try {
        const name = document.getElementById(`name_${id}`).value.trim();
        const layout = document.getElementById(`layout_${id}`).value || null;
        await apiPut(`/devices/${id}`, { name, layout });
        alert('Salvo com sucesso');
        loadDevices();
      } catch (e) {
        alert('Erro ao salvar');
        console.error(e);
      }
    }

    async function activateDeviceUi(id) {
      try {
        const name = document.getElementById(`name_${id}`).value.trim();
        const layoutId = document.getElementById(`layout_${id}`).value || null;
        const type = confirm('OK = anual\nCancelar = 2 anos') ? 'annual' : 'two_years';

        await apiPost(`/devices/${id}/activate`, { name, layoutId, type });
        alert('Aparelho ativado');
        loadDevices();
      } catch (e) {
        alert('Erro ao ativar');
        console.error(e);
      }
    }

    async function deactivateDeviceUi(id) {
      if (!confirm('Desativar aparelho?')) return;
      try {
        await apiPost(`/devices/${id}/deactivate`, {});
        alert('Desativado');
        loadDevices();
      } catch (e) {
        alert('Erro ao desativar');
        console.error(e);
      }
    }

    async function deleteDeviceUi(id) {
      if (!confirm('Excluir cliente/dispositivo?')) return;
      try {
        await apiDelete(`/devices/${id}`);
        alert('Excluído');
        loadDevices();
      } catch (e) {
        alert('Erro ao excluir');
        console.error(e);
      }
    }

    document.getElementById('search').addEventListener('input', render);
    loadDevices();
  </script>
</body>
</html>
