<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adicionar Fundo</title>
</head>
<body style="background:#0b1a2a;color:white;font-family:sans-serif">

  <h1>Adicionar fundo</h1>

  <form id="form">
    <input type="text" name="name" placeholder="Nome do fundo"><br><br>
    <input type="file" name="image"><br><br>

    <button type="submit">Enviar</button>
  </form>

  <script>
    const API = window.location.origin;

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(e.target);

      await fetch(API + '/fundos', {
        method: 'POST',
        body: formData
      });

      alert('Fundo enviado!');
      window.location.href = 'fundos.html';
    });
  </script>

</body>
</html>
