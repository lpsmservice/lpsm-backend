<html lang="pt-BR">
<body>

<h2>Adicionar Fundo</h2>

<form id="form">
  <input type="text" name="nome" placeholder="Nome do fundo" required><br><br>
  <input type="file" name="imagem" required><br><br>
  <button type="submit">Salvar</button>
</form>

<script>
const API = window.location.origin;

document.getElementById('form').onsubmit = async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);

  const res = await fetch(API + '/backgrounds', {
    method: 'POST',
    body: formData
  });

  alert('Fundo salvo!');
  window.location.href = 'fundos.html';
};
</script>

</body>
</html>
