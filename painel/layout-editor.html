<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAUNCHER BOX - Editor de Layout</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(90deg, #02101e 0%, #052444 100%);
      color: #fff;
    }

    .page {
      min-height: 100vh;
      padding-bottom: 90px;
    }

    .topbar {
      height: 58px;
      background: #0d2347;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .back-btn,
    .bell-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #fff;
      cursor: pointer;
    }

    .back-btn {
      left: 18px;
      font-size: 34px;
      line-height: 1;
    }

    .bell-btn {
      right: 18px;
      font-size: 28px;
      color: #f8c441;
    }

    .hero {
      padding: 18px;
      background: rgba(0,0,0,0.2);
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 30px;
      font-weight: 800;
    }

    .hero p {
      margin: 0;
      color: #dce7fb;
      font-size: 15px;
    }

    .status-box {
      margin: 14px 18px 0;
      padding: 14px 16px;
      border-radius: 8px;
      display: none;
      line-height: 1.7;
      font-size: 15px;
    }

    .status-box.show {
      display: block;
    }

    .status-box.error {
      background: #f44336;
      color: #fff;
    }

    .status-box.success {
      background: #20b15a;
      color: #fff;
    }

    .editor-list {
      margin-top: 0;
    }

    .editor-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(13,35,71,0.95);
      border-top: 1px solid rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      padding: 18px;
      cursor: pointer;
      color: #fff;
      text-decoration: none;
    }

    .editor-row:hover {
      background: rgba(18,42,78,0.98);
    }

    .editor-icon {
      width: 26px;
      text-align: center;
      flex-shrink: 0;
      color: #89a4c9;
      font-size: 18px;
    }

    .editor-name {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
    }

    .editor-arrow {
      color: #6d7f98;
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
    }

    .editor-info {
      margin: 18px;
      background: rgba(13,35,71,0.95);
      border-radius: 8px;
      padding: 18px;
      line-height: 1.9;
      color: #dce7fb;
      font-size: 15px;
    }

    .editor-actions {
      margin: 18px;
      display: grid;
      gap: 14px;
    }

    .btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: #2f7cff;
    }

    .btn-success {
      background: #39c65a;
    }

    .btn-danger {
      background: #f44336;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 60px;
      background: #0d2347;
      display: flex;
      align-items: center;
      justify-content: space-around;
      border-top: 1px solid rgba(255,255,255,0.06);
      z-index: 60;
    }

    .bottom-nav a {
      color: #fff;
      text-decoration: none;
      font-size: 30px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <button class="back-btn" onclick="window.location.href='layouts.html'">‹</button>
      LAUNCHER BOX
      <button class="bell-btn">🔔</button>
    </div>

    <div class="hero">
      <h1 id="layoutTitle">Editar Layout</h1>
      <p>Escolha abaixo a parte que deseja configurar neste layout.</p>
    </div>

    <div id="statusBox" class="status-box"></div>

    <div class="editor-info" id="layoutInfo">
      Carregando informações do layout...
    </div>

    <div class="editor-list">
      <a class="editor-row" href="#" onclick="aviso('Vamos ajustar a tela de escolher aplicativos no próximo passo.'); return false;">
        <div class="editor-icon">▦</div>
        <div class="editor-name">Escolher aplicativos</div>
        <div class="editor-arrow">›</div>
      </a>

      <a class="editor-row" href="#" onclick="aviso('Vamos ajustar a tela de plano de fundo no próximo passo.'); return false;">
        <div class="editor-icon">🖼</div>
        <div class="editor-name">Escolher plano de fundo</div>
        <div class="editor-arrow">›</div>
      </a>

      <a class="editor-row" href="#" onclick="aviso('Vamos ajustar a tela de banner no próximo passo.'); return false;">
        <div class="editor-icon">▭</div>
        <div class="editor-name">Escolher banner</div>
        <div class="editor-arrow">›</div>
      </a>

      <a class="editor-row" href="#" onclick="aviso('Vamos ajustar a tela de logo e posição no próximo passo.'); return false;">
        <div class="editor-icon">◎</div>
        <div class="editor-name">Logo e posição</div>
        <div class="editor-arrow">›</div>
      </a>

      <a class="editor-row" href="#" onclick="aviso('Vamos ajustar a tela de botões e bloqueios no próximo passo.'); return false;">
        <div class="editor-icon">⚙</div>
        <div class="editor-name">Botões e bloqueios</div>
        <div class="editor-arrow">›</div>
      </a>
    </div>

    <div class="editor-actions">
      <button class="btn btn-success" id="saveBtn">SALVAR LAYOUT</button>
      <button class="btn btn-danger" id="deleteBtn">EXCLUIR LAYOUT</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html">⌂</a>
    <a href="https://wa.me/" target="_blank">◔</a>
    <a href="devices.html">▭</a>
    <a href="launcher.html">▦</a>
    <a href="#top">↑</a>
  </nav>

  <script src="js/app.js"></script>
  <script>
    let currentLayout = null;
    let currentId = null;

    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function showStatus(message, type = 'error') {
      const box = document.getElementById('statusBox');
      box.className = `status-box show ${type}`;
      box.innerHTML = message;
    }

    function aviso(msg) {
      showStatus(`<strong>AVISO</strong><br>${msg}`, 'success');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function loadLayout() {
      currentId = getQueryParam('id');

      if (!currentId) {
        throw new Error('ID do layout não informado.');
      }

      const res = await fetch(`${window.location.origin}/layouts`);
      const data = await res.json().catch(() => []);

      if (!res.ok || !Array.isArray(data)) {
        throw new Error('Erro ao carregar layout.');
      }

      currentLayout = data.find(item => String(item.id) === String(currentId));

      if (!currentLayout) {
        throw new Error('Layout não encontrado.');
      }

      document.getElementById('layoutTitle').textContent = currentLayout.name || 'Editar Layout';

      document.getElementById('layoutInfo').innerHTML = `
        <strong>Nome:</strong> ${currentLayout.name || '-'}<br>
        <strong>Apps no layout:</strong> ${Array.isArray(currentLayout.apps) ? currentLayout.apps.length : 0}<br>
        <strong>Plano de fundo:</strong> ${currentLayout.background ? 'Configurado' : 'Não configurado'}<br>
        <strong>Banner:</strong> ${currentLayout.banners && currentLayout.banners.length ? 'Configurado' : 'Não configurado'}<br>
        <strong>Logo:</strong> ${currentLayout.logo ? 'Configurada' : 'Não configurada'}
      `;
    }

    async function saveLayout() {
      if (!currentLayout) return;

      const body = {
        ...currentLayout
      };

      const res = await fetch(`${window.location.origin}/layouts/${currentId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok || !data.ok) {
        throw new Error(data.message || 'Erro ao salvar layout.');
      }

      showStatus('<strong>SUCESSO</strong><br>Layout salvo com sucesso.', 'success');
    }

    async function deleteLayout() {
      if (!currentId) return;

      const ok = confirm('Deseja excluir este layout?');
      if (!ok) return;

      const res = await fetch(`${window.location.origin}/layouts/${currentId}`, {
        method: 'DELETE'
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok || !data.ok) {
        throw new Error(data.message || 'Erro ao excluir layout.');
      }

      showStatus('<strong>SUCESSO</strong><br>Layout excluído com sucesso.', 'success');

      setTimeout(() => {
        window.location.href = 'layouts.html';
      }, 700);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (typeof authGuard === 'function') authGuard();

      try {
        await loadLayout();
      } catch (e) {
        console.error(e);
        showStatus(`<strong>ERRO</strong><br>${e.message || 'Erro ao abrir layout.'}`);
      }

      document.getElementById('saveBtn').addEventListener('click', async () => {
        try {
          await saveLayout();
        } catch (e) {
          console.error(e);
          showStatus(`<strong>ERRO</strong><br>${e.message || 'Erro ao salvar layout.'}`);
        }
      });

      document.getElementById('deleteBtn').addEventListener('click', async () => {
        try {
          await deleteLayout();
        } catch (e) {
          console.error(e);
          showStatus(`<strong>ERRO</strong><br>${e.message || 'Erro ao excluir layout.'}`);
        }
      });
    });
  </script>
</body>
</html>
