<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar layout</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#071727;
  color:#fff;
}

.topbar{
  background:#287df3;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:20px;
  position:sticky;
  top:0;
}

.container{
  padding:20px;
}

.card{
  background:#0d1f35;
  padding:20px;
  border-radius:8px;
  margin-bottom:20px;
}

.upload{
  border:1px dashed #3a4c66;
  height:200px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border-radius:8px;
}

button{
  width:100%;
  height:50px;
  background:#287df3;
  border:none;
  color:#fff;
  font-size:18px;
  border-radius:6px;
  margin-top:20px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.bg-card{
  background:#10243d;
  border-radius:8px;
  padding:10px;
  text-align:center;
}

.bg-card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:6px;
}

.small-btn{
  width:100px;
  height:40px;
  background:#6b7b91;
  border-radius:6px;
  border:none;
  color:#fff;
  cursor:pointer;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#10243d;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
}
</style>
</head>

<body>

<div class="topbar">Editar layout</div>

<div class="container">

<!-- PARTE 1 -->
<div class="card">
  <h3>Dados</h3>

  <input id="nome" placeholder="Nome do layout" style="width:100%;height:45px;margin-top:10px">

  <select id="logoPos" style="width:100%;height:45px;margin-top:10px">
    <option value="left">ESQUERDA</option>
    <option value="center">CENTRO</option>
    <option value="right">DIREITA</option>
  </select>

  <select id="bloqueio" style="width:100%;height:45px;margin-top:10px">
    <option value="nao">NÃO</option>
    <option value="sim">SIM</option>
  </select>

  <input id="senha" placeholder="Senha" style="width:100%;height:45px;margin-top:10px">

  <select id="apps" style="width:100%;height:45px;margin-top:10px">
    <option value="sim">SIM</option>
    <option value="nao">NÃO</option>
  </select>

  <button onclick="ir2()">Prosseguir</button>
</div>

<!-- PARTE 2 -->
<div class="card" id="step2" style="display:none">
  <h3>Logomarca</h3>

  <label class="upload" for="logoFile" id="logoBox">
    Clique para escolher
  </label>

  <input type="file" id="logoFile" style="display:none">

  <button onclick="ir3()">Prosseguir</button>
</div>

<!-- PARTE 3 -->
<div class="card" id="step3" style="display:none">
  <h3>Plano de fundo</h3>

  <button onclick="ir4()">Prosseguir</button>

  <div style="display:flex;justify-content:space-around;margin:20px 0;">
    <button class="small-btn" onclick="abrirExibir()">EXIBIR</button>
    <button class="small-btn" onclick="abrirBuscar()">BUSCAR</button>
  </div>

  <div id="fundos" class="grid"></div>
</div>

<!-- PARTE 4 -->
<div class="card" id="step4" style="display:none">
  <h3>Finalizar</h3>
  <button onclick="salvar()">SALVAR</button>
</div>

</div>

<!-- MODAL EXIBIR -->
<div id="modalExibir" class="modal">
  <div class="modal-box">
    <h3>Modo de exibição</h3>
    <button onclick="fechar()">FECHAR</button>
  </div>
</div>

<!-- MODAL BUSCAR -->
<div id="modalBuscar" class="modal">
  <div class="modal-box">
    <h3>Buscar fundo</h3>
    <input placeholder="Nome" style="width:100%;height:40px;margin:10px 0">
    <button onclick="fechar()">FECHAR</button>
  </div>
</div>

<script>
function ir2(){
  document.querySelector('.card').style.display='none'
  document.getElementById('step2').style.display='block'
}

function ir3(){
  document.getElementById('step2').style.display='none'
  document.getElementById('step3').style.display='block'
}

function ir4(){
  document.getElementById('step3').style.display='none'
  document.getElementById('step4').style.display='block'
}

function abrirExibir(){
  document.getElementById('modalExibir').style.display='flex'
}

function abrirBuscar(){
  document.getElementById('modalBuscar').style.display='flex'
}

function fechar(){
  document.getElementById('modalExibir').style.display='none'
  document.getElementById('modalBuscar').style.display='none'
}

function salvar(){
  alert("Layout salvo")
}
</script>

</body>
</html>
