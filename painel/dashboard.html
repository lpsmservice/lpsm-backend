<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LPSM BOX - Dashboard</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#031a3a;color:#fff}
    .topbar{height:88px;background:#041c42;display:flex;align-items:center;justify-content:space-between;padding:0 22px}
    .logo-title{font-size:28px;font-weight:700}
    .page{padding:18px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .card{background:#050505;border-radius:999px;min-height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
    .card b{font-size:18px}
    .v{min-width:38px;height:38px;border-radius:999px;background:#22c55e;display:flex;align-items:center;justify-content:center;font-weight:700}
    .menu{margin-top:28px;display:flex;flex-direction:column;gap:14px}
    .item{background:#0a2346;border-radius:14px;padding:20px;font-size:18px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between}
    button{background:#2f76f3;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo-title">LPSM BOX</div>
    <button onclick="logout()">SAIR</button>
  </div>

  <div class="page">
    <h2>Dashboard</h2>

    <div class="grid">
      <div class="card"><b>ANUAL</b><span class="v" id="annualCredits">0</span></div>
      <div class="card"><b>2 ANOS</b><span class="v" id="twoYearCredits">0</span></div>
      <div class="card"><b>Layouts</b><span class="v" id="totalLayouts">0</span></div>
      <div class="card"><b>Apps</b><span class="v" id="totalApps">0</span></div>
      <div class="card"><b>Ativos</b><span class="v" id="activeDevices">0</span></div>
      <div class="card"><b>Pendentes</b><span class="v" id="pendingDevices">0</span></div>
      <div class="card"><b>Revendas</b><span class="v" id="totalResellers">0</span></div>
    </div>

    <div class="menu">
      <div class="item" onclick="window.location.href='devices.html'">Gerenciar dispositivos/clientes <span>></span></div>
      <div class="item" onclick="window.location.href='apps.html'">Meus aplicativos <span>></span></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    async function loadStats() {
      try {
        const d = await apiGet('/dashboard');
        document.getElementById('annualCredits').textContent = d.annualCreditsInUse || 0;
        document.getElementById('twoYearCredits').textContent = d.twoYearsCreditsInUse || 0;
        document.getElementById('totalLayouts').textContent = d.totalLayouts || 0;
        document.getElementById('totalApps').textContent = d.totalApps || 0;
        document.getElementById('activeDevices').textContent = d.activeDevices || 0;
        document.getElementById('pendingDevices').textContent = d.pendingDevices || 0;
        document.getElementById('totalResellers').textContent = d.totalResellers || 0;
      } catch (e) {
        alert('Erro ao carregar dashboard');
        console.error(e);
      }
    }
    loadStats();
  </script>
</body>
</html>
