<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LPSM BOX - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1 class="login-title">LOGIN</h1>

      <input id="email" class="login-input" type="text" placeholder="LOGIN ou EMAIL">
      <input id="senha" class="login-input" type="password" placeholder="SENHA">

      <button class="login-btn" onclick="login()">ENTRAR</button>

      <div class="login-tip">
        Login padrão:<br>
        admin@lpsm.com<br>
        Senha padrão:<br>
        951753
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('senha').value.trim();

      if (!email || !password) {
        alert('Preencha login e senha');
        return;
      }

      try {
        const res = await fetch(API + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          alert(data.message || 'Login inválido');
          return;
        }

        localStorage.setItem('painel_logado', '1');
        localStorage.setItem('painel_user', JSON.stringify(data.user || {}));
        window.location.href = 'dashboard.html';
      } catch (e) {
        alert('Erro ao fazer login');
        console.error(e);
      }
    }

    if (localStorage.getItem('painel_logado') === '1') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
