<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LPSM BOX - Apps</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <div class="drawer-avatar">LP</div>
      <div class="drawer-user">
        <strong id="drawerUserName">LPSM BOX</strong>
        <span id="drawerUserEmail">admin@lpsm.com</span>
      </div>
      <div class="drawer-close" id="drawerClose">×</div>
    </div>

    <div class="drawer-item" onclick="window.location.href='dashboard.html'">
      <div class="drawer-item-left"><span>📋</span><span>Dashboard</span></div><span>›</span>
    </div>
    <div class="drawer-item" onclick="window.location.href='devices.html'">
      <div class="drawer-item-left"><span>🖥️</span><span>Gerenciar clientes</span></div><span>›</span>
    </div>
    <div class="drawer-item" onclick="window.location.href='apps.html'">
      <div class="drawer-item-left"><span>📦</span><span>Meus aplicativos</span></div><span>›</span>
    </div>

    <div class="drawer-section-title">Configurações</div>

    <div class="drawer-item" onclick="logout()">
      <div class="drawer-item-left"><span>↩</span><span>Sair</span></div><span>›</span>
    </div>

    <div class="drawer-bottom">
      <div class="db-item">👤</div>
      <div class="db-item">🧱</div>
      <div class="db-item">⚙</div>
      <div class="db-item" onclick="logout()">⎋</div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-left">
      <button class="icon-btn" id="menuBtn">☰</button>
    </div>
    <div class="logo-title">LAUNCHER BOX</div>
    <div class="topbar-right">
      <button class="icon-btn">🔔</button>
    </div>
  </header>

  <main class="page">
    <div class="hero-title">Meus aplicativos</div>
    <div class="hero-sub">
      Aqui você poderá cadastrar APK, ícone e deixar pronto para o cliente instalar pela launcher.
    </div>

    <div class="form-card">
      <div class="form-title">Cadastrar aplicativo</div>

      <div class="form-grid">
        <input id="appName" placeholder="Nome do app">
        <input id="appPackage" placeholder="Pacote do app">
        <input id="appVersion" placeholder="Versão">
        <input id="appApkUrl" placeholder="URL APK (opcional)">
        <input id="appIconUrl" placeholder="URL ícone (opcional)">
        <input id="search" placeholder="Buscar app">
      </div>

      <div class="form-grid" style="margin-top:12px">
        <div class="file-box">
          <label>Upload APK</label><br><br>
          <input id="apkFile" type="file" accept=".apk">
        </div>
        <div class="file-box">
          <label>Upload ícone</label><br><br>
          <input id="iconFile" type="file" accept="image/*">
        </div>
      </div>

      <div class="form-actions">
        <button onclick="saveApp()">SALVAR APP</button>
        <button onclick="loadApps()">ATUALIZAR LISTA</button>
      </div>
    </div>

    <div id="appList"></div>
  </main>

  <script src="js/app.js"></script>
  <script>
    let APPS = [];

    function fillDrawerUser() {
      try {
        const user = JSON.parse(localStorage.getItem('painel_user') || '{}');
        document.getElementById('drawerUserName').textContent = user.companyName || 'LPSM BOX';
        document.getElementById('drawerUserEmail').textContent = user.email || 'admin@lpsm.com';
      } catch {}
    }

    function iconUrl(app) {
      if (!app.icon) return 'https://via.placeholder.com/54x54.png?text=APP';
      return app.icon.startsWith('http') ? app.icon : `${window.location.origin}${app.icon}`;
    }

    function renderApps() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const box = document.getElementById('appList');

      const items = APPS.filter(a => {
        return !q || (a.name || '').toLowerCase().includes(q) || (a.package || '').toLowerCase().includes(q);
      });

      if (!items.length) {
        box.innerHTML = `<div class="app-card">Nenhum app cadastrado.</div>`;
        return;
      }

      box.innerHTML = items.map(app => `
        <div class="app-card">
          <div class="app-head">
            <div class="app-left">
              <img class="app-icon" src="${iconUrl(app)}">
              <div class="app-name">${safe(app.name, 'Sem nome')}</div>
            </div>
            <div>${app.active === false ? 'Desativado' : 'Ativo'}</div>
          </div>

          <div class="app-meta">
            Pacote: ${safe(app.package)}<br>
            Versão: ${safe(app.version)}<br>
            APK: ${safe(app.apk)}
          </div>

          <div class="app-actions">
            <button class="btn-edit" onclick="editApp('${app.id}')">Editar</button>
            <button class="btn-delete" onclick="deleteAppUi('${app.id}')">Excluir</button>
          </div>
        </div>
      `).join('');
    }

    async function loadApps() {
      try {
        APPS = await apiGet('/apps');
        renderApps();
      } catch (e) {
        alert('Erro ao carregar apps');
        console.error(e);
      }
    }

    async function saveApp() {
      try {
        const name = document.getElementById('appName').value.trim();
        const packageName = document.getElementById('appPackage').value.trim();
        const version = document.getElementById('appVersion').value.trim() || '1.0';
        let apk = document.getElementById('appApkUrl').value.trim();
        let icon = document.getElementById('appIconUrl').value.trim();

        if (!name) {
          alert('Digite o nome do app');
          return;
        }

        const apkFile = document.getElementById('apkFile').files[0];
        const iconFile = document.getElementById('iconFile').files[0];

        if (apkFile) {
          const up = await uploadFile('/upload/apk', apkFile);
          apk = up.url;
        }

        if (iconFile) {
          const up = await uploadFile('/upload/image', iconFile);
          icon = up.url;
        }

        await apiPost('/apps', {
          name,
          package: packageName,
          version,
          apk,
          icon,
          active: true
        });

        alert('App salvo com sucesso');

        document.getElementById('appName').value = '';
        document.getElementById('appPackage').value = '';
        document.getElementById('appVersion').value = '';
        document.getElementById('appApkUrl').value = '';
        document.getElementById('appIconUrl').value = '';
        document.getElementById('apkFile').value = '';
        document.getElementById('iconFile').value = '';

        loadApps();
      } catch (e) {
        alert('Erro ao salvar app');
        console.error(e);
      }
    }

    async function editApp(id) {
      const app = APPS.find(a => a.id === id);
      if (!app) return;

      const name = prompt('Nome do app:', app.name || '');
      if (name === null) return;

      const packageName = prompt('Pacote do app:', app.package || '');
      if (packageName === null) return;

      const version = prompt('Versão do app:', app.version || '1.0');
      if (version === null) return;

      try {
        await apiPut(`/apps/${id}`, {
          ...app,
          name,
          package: packageName,
          version
        });

        loadApps();
      } catch (e) {
        alert('Erro ao editar app');
        console.error(e);
      }
    }

    async function deleteAppUi(id) {
      if (!confirm('Excluir app?')) return;

      try {
        await apiDelete(`/apps/${id}`);
        loadApps();
      } catch (e) {
        alert('Erro ao excluir app');
        console.error(e);
      }
    }

    document.getElementById('search').addEventListener('input', renderApps);

    fillDrawerUser();
    bindDrawer();
    loadApps();
  </script>
</body>
</html>
