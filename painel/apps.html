<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LPSM BOX - Apps</title>
  <style>
    body{margin:0;background:#04152d;color:#fff;font-family:Arial,Helvetica,sans-serif}
    .topbar{height:82px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:#0b2a55}
    .page{padding:18px;padding-bottom:100px}
    .form{background:#0a2346;border-radius:18px;padding:18px;margin-bottom:18px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    input,button{height:52px;border:none;border-radius:12px;padding:0 14px;font-size:16px;box-sizing:border-box}
    input{background:#10274a;color:#fff}
    button{background:#2f76f3;color:#fff;font-weight:700;cursor:pointer}
    .list{display:flex;flex-direction:column;gap:12px}
    .card{background:#0a2346;border-radius:16px;padding:16px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .title{font-size:20px;font-weight:800}
    .meta{margin-top:10px;line-height:1.8;color:#d8e3f4}
    .icon{width:52px;height:52px;border-radius:10px;object-fit:cover;background:#fff}
    .danger{background:#922d2d}
    @media (max-width:900px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="topbar">
    <b>LPSM BOX</b>
    <button onclick="window.location.href='dashboard.html'">Voltar</button>
  </div>

  <div class="page">
    <div class="form">
      <h2>Cadastrar aplicativo</h2>

      <div class="row">
        <input id="appName" placeholder="Nome do app">
        <input id="appPackage" placeholder="Pacote do app">
      </div>

      <div class="row">
        <input id="appVersion" placeholder="Versão">
        <input id="appApkUrl" placeholder="URL APK (opcional)">
      </div>

      <div class="row">
        <input id="appIconUrl" placeholder="URL ícone (opcional)">
        <input id="search" placeholder="Buscar app">
      </div>

      <div class="row">
        <div>
          <label>Upload APK</label><br>
          <input id="apkFile" type="file" accept=".apk">
        </div>
        <div>
          <label>Upload ícone</label><br>
          <input id="iconFile" type="file" accept="image/*">
        </div>
      </div>

      <div class="row">
        <button onclick="saveApp()">SALVAR APP</button>
        <button onclick="loadApps()">ATUALIZAR LISTA</button>
      </div>
    </div>

    <div id="list" class="list"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let APPS = [];

    function iconSrc(app) {
      if (!app.icon) return 'https://via.placeholder.com/52x52.png?text=APP';
      return app.icon.startsWith('http') ? app.icon : `${window.location.origin}${app.icon}`;
    }

    function render() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const box = document.getElementById('list');

      const items = APPS.filter(a => {
        return !q || (a.name || '').toLowerCase().includes(q) || (a.package || '').toLowerCase().includes(q);
      });

      if (!items.length) {
        box.innerHTML = '<div class="card">Nenhum app cadastrado.</div>';
        return;
      }

      box.innerHTML = items.map(app => `
        <div class="card">
          <div class="head">
            <div style="display:flex;align-items:center;gap:12px">
              <img class="icon" src="${iconSrc(app)}">
              <div class="title">${safe(app.name, 'Sem nome')}</div>
            </div>
            <div>
              <button onclick="editAppUi('${app.id}')">Editar</button>
              <button class="danger" onclick="deleteAppUi('${app.id}')">Excluir</button>
            </div>
          </div>
          <div class="meta">
            Pacote: ${safe(app.package)}<br>
            Versão: ${safe(app.version)}<br>
            APK: ${safe(app.apk)}<br>
            Status: ${app.active === false ? 'Desativado' : 'Ativo'}
          </div>
        </div>
      `).join('');
    }

    async function loadApps() {
      try {
        APPS = await apiGet('/apps');
        render();
      } catch (e) {
        alert('Erro ao carregar apps');
        console.error(e);
      }
    }

    async function saveApp() {
      try {
        const name = document.getElementById('appName').value.trim();
        const packageName = document.getElementById('appPackage').value.trim();
        const version = document.getElementById('appVersion').value.trim() || '1.0';
        let apk = document.getElementById('appApkUrl').value.trim();
        let icon = document.getElementById('appIconUrl').value.trim();

        const apkFile = document.getElementById('apkFile').files[0];
        const iconFile = document.getElementById('iconFile').files[0];

        if (!name) {
          alert('Digite o nome do app');
          return;
        }

        if (apkFile) {
          const upApk = await uploadFile('/upload/apk', apkFile);
          apk = upApk.url;
        }

        if (iconFile) {
          const upIcon = await uploadFile('/upload/image', iconFile);
          icon = upIcon.url;
        }

        await apiPost('/apps', {
          name,
          package: packageName,
          version,
          apk,
          icon,
          active: true
        });

        alert('App salvo com sucesso');

        document.getElementById('appName').value = '';
        document.getElementById('appPackage').value = '';
        document.getElementById('appVersion').value = '';
        document.getElementById('appApkUrl').value = '';
        document.getElementById('appIconUrl').value = '';
        document.getElementById('apkFile').value = '';
        document.getElementById('iconFile').value = '';

        loadApps();
      } catch (e) {
        alert('Erro ao salvar app');
        console.error(e);
      }
    }

    async function editAppUi(id) {
      const app = APPS.find(a => a.id === id);
      if (!app) return;

      const newName = prompt('Nome do app:', app.name || '');
      if (newName === null) return;

      const newPackage = prompt('Pacote do app:', app.package || '');
      if (newPackage === null) return;

      const newVersion = prompt('Versão do app:', app.version || '1.0');
      if (newVersion === null) return;

      try {
        await apiPut(`/apps/${id}`, {
          ...app,
          name: newName,
          package: newPackage,
          version: newVersion
        });
        alert('App atualizado');
        loadApps();
      } catch (e) {
        alert('Erro ao editar app');
        console.error(e);
      }
    }

    async function deleteAppUi(id) {
      if (!confirm('Excluir app?')) return;

      try {
        await apiDelete(`/apps/${id}`);
        alert('App excluído');
        loadApps();
      } catch (e) {
        alert('Erro ao excluir app');
        console.error(e);
      }
    }

    document.getElementById('search').addEventListener('input', render);
    loadApps();
  </script>
</body>
</html>
