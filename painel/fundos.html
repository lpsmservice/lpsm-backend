<html lang="pt-BR">
<body>

<h2>Fundos cadastrados</h2>

<button onclick="window.location.href='addfundos.html'">
  + Adicionar Fundo
</button>

<div id="lista"></div>

<script>
const API = window.location.origin;

async function load() {
  const res = await fetch(API + '/backgrounds');
  const data = await res.json();

  const el = document.getElementById('lista');

  if (!data.length) {
    el.innerHTML = 'Nenhum fundo cadastrado';
    return;
  }

  el.innerHTML = data.map(item => `
    <div style="margin:10px">
      <img src="${item.imagem}" width="200"><br>
      ${item.nome}
    </div>
  `).join('');
}

load();
</script>

</body>
</html>
