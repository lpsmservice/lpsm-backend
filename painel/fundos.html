<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fundos</title>

<style>
body {
  background: #0b1c2c;
  color: white;
  font-family: Arial;
  margin: 0;
}

.top {
  background: #1f6feb;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.btn {
  background: #2f81f7;
  border: none;
  padding: 12px;
  color: white;
  width: 100%;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: #0f2740;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.nome {
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="top">LAUNCHER BOX</div>

<div class="container">

<button class="btn" onclick="window.location.href='addfundos.html'">
+ ADICIONAR FUNDO
</button>

<div id="lista" class="grid"></div>

</div>

<script>
const API = "https://lpsm-backend.onrender.com";

async function load() {
  try {
    const res = await fetch(API + '/backgrounds');
    const data = await res.json();

    const el = document.getElementById('lista');

    if (!data.length) {
      el.innerHTML = 'Nenhum fundo cadastrado';
      return;
    }

    el.innerHTML = data.map(item => `
      <div class="card">
        <img src="${item.imagem}">
        <div class="nome">${item.nome}</div>
      </div>
    `).join('');

  } catch (err) {
    document.getElementById('lista').innerHTML = 'Erro ao carregar';
  }
}

load();
</script>

</body>
</html>
