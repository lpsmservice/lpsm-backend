<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Planos de Fundo</title>
</head>

<body>

<main class="page">
  <h1>Meus planos de fundo</h1>

  <button onclick="window.location.href='addplanodefundo.html'">
    + ADICIONAR FUNDO
  </button>

  <div id="lista"></div>
</main>

<script>
const API = window.location.origin;

async function load() {
  const res = await fetch(API + '/backgrounds');
  const data = await res.json();

  const el = document.getElementById('lista');

  if (!data.length) {
    el.innerHTML = '<div>Nenhum fundo cadastrado</div>';
    return;
  }

  el.innerHTML = data.map(item => `
    <div style="margin:10px">
      <img src="${item.image}" style="width:250px;border-radius:10px">
      <div>${item.name}</div>
    </div>
  `).join('');
}

load();
</script>

</body>
</html>
