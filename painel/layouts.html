<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LPSM BOX - Layouts</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#04152d;color:#fff}
    .topbar{height:82px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:#0b2a55;border-bottom:1px solid rgba(255,255,255,0.08)}
    .menu-btn,.icon-btn{background:transparent;border:none;color:#fff;font-size:34px;cursor:pointer}
    .brand{font-size:22px;font-weight:800;letter-spacing:1px}
    .page{padding:18px;padding-bottom:110px}
    .action-btn{width:100%;border:none;border-radius:12px;background:#2f76f3;color:#fff;font-size:20px;font-weight:700;padding:18px;margin-bottom:14px;cursor:pointer}
    .tools-row{display:grid;grid-template-columns:150px 1fr 150px;gap:12px;margin:18px 0}
    .tools-row button,.tools-row input{height:56px;border-radius:12px;border:none;font-size:18px;padding:0 18px;box-sizing:border-box}
    .tools-row input{background:#0d2344;color:#fff;outline:none;border:1px solid rgba(255,255,255,0.08)}
    .secondary-btn{background:#7285a4;color:#fff;font-weight:700;cursor:pointer}
    .section-title{font-size:18px;font-weight:800;margin:24px 0 10px;text-transform:uppercase}
    .layout-list{display:flex;flex-direction:column;gap:14px}
    .layout-card{background:#0a2346;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,0.06)}
    .layout-head{display:flex;justify-content:space-between;align-items:center;padding:18px;cursor:pointer;font-size:18px;font-weight:700}
    .layout-body{display:none;padding:0 18px 18px;border-top:1px solid rgba(255,255,255,0.06)}
    .layout-body.open{display:block}
    .row-action{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;font-size:18px}
    .row-action:last-child{border-bottom:none}
    .data-grid{margin-top:18px;display:grid;grid-template-columns:1fr 1fr;border:1px solid rgba(255,255,255,0.05);border-radius:14px;overflow:hidden}
    .data-cell{padding:18px;text-align:center;border-right:1px solid rgba(255,255,255,0.05);border-top:1px solid rgba(255,255,255,0.05);font-size:17px}
    .data-cell:nth-child(2n){border-right:none}
    .empty-box{background:#0a2346;border-radius:18px;padding:24px;color:#c9d5ea;font-size:18px}
    .bottom-nav{position:fixed;left:0;right:0;bottom:0;height:72px;background:#0b2348;display:flex;align-items:center;justify-content:space-around;border-top:1px solid rgba(255,255,255,0.08)}
    .bottom-nav a{color:#fff;text-decoration:none;font-size:30px}
    @media (max-width:900px){.tools-row{grid-template-columns:1fr}.data-grid{grid-template-columns:1fr}.data-cell{border-right:none}}
  </style>
</head>
<body>
  <div class="topbar">
    <button class="menu-btn" onclick="window.location.href='dashboard.html'">☰</button>
    <div class="brand">LPSM BOX</div>
    <button class="icon-btn">🔔</button>
  </div>

  <div class="page">
    <button class="action-btn" onclick="alert('Tela ADD LAYOUT completa eu faço no próximo passo.')">ADD LAYOUT</button>
    <button class="action-btn" onclick="copyLayout()">COPIAR LAYOUT</button>

    <div class="tools-row">
      <button class="secondary-btn" onclick="loadLayouts()">EXIBIR</button>
      <input id="searchInput" type="text" placeholder="Buscar layout" />
      <button class="secondary-btn" onclick="filterLayouts()">BUSCAR</button>
    </div>

    <div class="section-title">LAYOUTS MEUS:</div>
    <div id="layoutsList" class="layout-list"></div>
  </div>

  <div class="bottom-nav">
    <a href="dashboard.html">⌂</a>
    <a href="resellers.html">💬</a>
    <a href="devices.html">▣</a>
    <a href="glauncher.html">▦</a>
    <a href="#">⇧</a>
  </div>

  <script src="js/app.js"></script>
  <script>
    let ALL_LAYOUTS = [];
    let ALL_DEVICES = [];

    async function loadLayouts() {
      try {
        const [layouts, devices] = await Promise.all([
          apiGet('/layouts'),
          apiGet('/devices')
        ]);

        ALL_LAYOUTS = Array.isArray(layouts) ? layouts : [];
        ALL_DEVICES = Array.isArray(devices) ? devices : [];
        renderLayouts(ALL_LAYOUTS);
      } catch (e) {
        alert('Erro ao carregar layouts');
        console.error(e);
      }
    }

    function devicesUsingLayout(layoutId) {
      return ALL_DEVICES.filter(d => d.layout === layoutId || d.layoutId === layoutId).length;
    }

    function buildLayoutCard(layout) {
      const createdAt = layout.createdAt ? new Date(layout.createdAt).toLocaleString('pt-BR') : '-';
      const appsCount = Array.isArray(layout.apps) ? layout.apps.length : 0;
      const bannersCount = Array.isArray(layout.banners) ? layout.banners.length : 0;

      return `
        <div class="layout-card">
          <div class="layout-head" onclick="toggleBody('${layout.id}')">
            <span>${layout.name || 'Novo layout'}</span>
            <span>⌄</span>
          </div>

          <div id="body-${layout.id}" class="layout-body">
            <div class="row-action" onclick="goManageApps('${layout.id}')">
              <span>Escolher aplicativos do layout</span>
              <span>›</span>
            </div>

            <div class="row-action" onclick="renameLayout('${layout.id}', '${(layout.name || '').replace(/'/g, "\\'")}')">
              <span>Alterar nome do layout</span>
              <span>›</span>
            </div>

            <div class="row-action" onclick="deleteLayout('${layout.id}')">
              <span>Excluir</span>
              <span>›</span>
            </div>

            <div class="data-grid">
              <div class="data-cell"><strong>QTD Dispositivos</strong><br>${devicesUsingLayout(layout.id)}</div>
              <div class="data-cell"><strong>Última alteração</strong><br>${createdAt}</div>
              <div class="data-cell"><strong>Apps no layout</strong><br>${appsCount}</div>
              <div class="data-cell"><strong>Banners</strong><br>${bannersCount}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderLayouts(layouts) {
      const box = document.getElementById('layoutsList');

      if (!layouts.length) {
        box.innerHTML = `<div class="empty-box">Nenhum layout cadastrado ainda.</div>`;
        return;
      }

      box.innerHTML = layouts.map(buildLayoutCard).join('');
    }

    function toggleBody(id) {
      document.getElementById(`body-${id}`).classList.toggle('open');
    }

    function filterLayouts() {
      const term = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!term) {
        renderLayouts(ALL_LAYOUTS);
        return;
      }

      const filtered = ALL_LAYOUTS.filter(l =>
        (l.name || '').toLowerCase().includes(term)
      );

      renderLayouts(filtered);
    }

    function goManageApps(id) {
      alert(`Gerenciar apps do layout ${id}\n\nNa próxima etapa eu te entrego a tela completa para escolher apps, banner e fundo.`);
    }

    async function renameLayout(id, oldName) {
      const newName = prompt('Novo nome do layout:', oldName || '');
      if (!newName) return;

      try {
        const layout = ALL_LAYOUTS.find(l => l.id === id);
        if (!layout) return;

        const json = await apiPut(`/layouts/${id}`, {
          ...layout,
          name: newName
        });

        if (!json.ok) {
          alert(json.message || 'Erro ao renomear layout');
          return;
        }

        loadLayouts();
      } catch (e) {
        alert('Erro ao renomear layout');
        console.error(e);
      }
    }

    async function deleteLayout(id) {
      if (!confirm('Deseja realmente excluir este layout?')) return;

      try {
        const json = await apiDelete(`/layouts/${id}`);
        if (!json.ok) {
          alert(json.message || 'Erro ao excluir layout');
          return;
        }
        loadLayouts();
      } catch (e) {
        alert('Erro ao excluir layout');
        console.error(e);
      }
    }

    function copyLayout() {
      alert('A cópia do layout eu monto no próximo passo sem quebrar o painel.');
    }

    loadLayouts();
  </script>
</body>
</html>
