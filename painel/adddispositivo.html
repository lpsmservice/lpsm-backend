<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Adicionar Dispositivo</title>

<style>
body {
  background:#0b1b2b;
  color:#fff;
  font-family:Arial;
  margin:0;
}

.container {
  padding:20px;
}

input, select {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:6px;
  border:none;
}

button {
  width:100%;
  padding:14px;
  background:#2d7ef7;
  border:none;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- ETAPA 1 -->
<div id="step1">
  <h2>ID do dispositivo</h2>

  <input id="code" placeholder="Código do dispositivo">

  <button onclick="proximo1()">Prosseguir >>></button>
</div>

<!-- ETAPA 2 -->
<div id="step2" style="display:none;">
  <h2>Configuração Cliente</h2>

  <input id="name" placeholder="Nome do cliente">
  <input id="phone" placeholder="Telefone">
  <input id="planName" placeholder="Plano">
  <input id="expiresAt" placeholder="Data expiração">

  <button onclick="proximo2()">Prosseguir >>></button>
</div>

<!-- ETAPA 3 -->
<div id="step3" style="display:none;">
  <h2>Configuração Dispositivo</h2>

  <label>Layout da launcher</label>
  <select id="layoutSelect">
    <option>Carregando...</option>
  </select>

  <label>Permitir acesso data/hora?</label>
  <select id="allowDate">
    <option value="NÃO">NÃO</option>
    <option value="SIM">SIM</option>
  </select>

  <button onclick="proximo3()">Prosseguir >>></button>
</div>

<!-- ETAPA 4 -->
<div id="step4" style="display:none;">
  <h2>Conclusão</h2>

  <button onclick="salvar()">ATIVAR DISPOSITIVO</button>
</div>

</div>

<script>

const API = window.location.origin;

let deviceId = null;

// ================= STEP 1
async function proximo1() {
  const code = document.getElementById('code').value;

  if (!code) {
    alert('Digite o código');
    return;
  }

  const res = await fetch(API + '/launcher/device/' + code);
  const data = await res.json();

  deviceId = data.device.id;

  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
}

// ================= STEP 2
function proximo2() {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'block';

  carregarLayouts();
}

// ================= CARREGAR LAYOUTS
async function carregarLayouts() {
  try {
    const res = await fetch(API + '/layouts');
    const data = await res.json();

    const select = document.getElementById('layoutSelect');

    if (!data.length) {
      select.innerHTML = '<option>Nenhum layout encontrado</option>';
      return;
    }

    select.innerHTML = `
      <option value="">Selecione um layout</option>
      ${data.map(l => `<option value="${l.id}">${l.name}</option>`).join('')}
    `;

  } catch (e) {
    console.log(e);
    document.getElementById('layoutSelect').innerHTML = '<option>Erro</option>';
  }
}

// ================= STEP 3
function proximo3() {
  const layout = document.getElementById('layoutSelect').value;

  if (!layout) {
    alert('Escolha um layout');
    return;
  }

  document.getElementById('step3').style.display = 'none';
  document.getElementById('step4').style.display = 'block';
}

// ================= SALVAR
async function salvar() {

  const body = {
    name: document.getElementById('name').value,
    phone: document.getElementById('phone').value,
    planName: document.getElementById('planName').value,
    expiresAt: document.getElementById('expiresAt').value,
    layoutId: document.getElementById('layoutSelect').value
  };

  const res = await fetch(API + '/devices/' + deviceId + '/complete-activation', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });

  const data = await res.json();

  if (!data.ok) {
    alert('Erro ao ativar');
    return;
  }

  alert('Dispositivo ativado!');
  window.location.href = 'devices.html';
}

</script>

</body>
</html>
