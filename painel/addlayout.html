<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adicionar layout</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(90deg, #02101e 0%, #052444 100%);
  color: #fff;
}

.topbar {
  height: 60px;
  background: #2f7cff;
  display: flex;
  align-items: center;
  justify-content: center;
  position: sticky;
  top: 0;
  font-size: 18px;
  font-weight: bold;
}

.back {
  position: absolute;
  left: 15px;
  font-size: 30px;
  background: transparent;
  border: none;
  color: #fff;
  cursor: pointer;
}

.steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: #10213f;
  padding: 14px 8px;
  text-align: center;
  font-size: 13px;
}

.step .circle {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #243754;
  color: #9ab0d0;
  margin-bottom: 6px;
  font-weight: bold;
}

.step.active .circle {
  background: #2f7cff;
  color: #fff;
}

.section {
  padding: 20px;
}

.label {
  display: block;
  margin: 14px 0 8px;
  color: #c8d5e8;
}

.input, .select {
  width: 100%;
  height: 48px;
  border: none;
  border-radius: 6px;
  background: #1d2f4c;
  color: #fff;
  padding: 0 14px;
  font-size: 16px;
}

.help {
  margin-top: 6px;
  color: #8ea5c3;
  font-size: 13px;
}

.btn {
  width: 100%;
  height: 52px;
  margin-top: 20px;
  background: #2f7cff;
  border: none;
  border-radius: 6px;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <button class="back" onclick="history.back()">‹</button>
  Adicionar layout
</div>

<div class="steps">
  <div class="step active"><div class="circle">1</div><div>Dados</div></div>
  <div class="step"><div class="circle">2</div><div>Logomarca</div></div>
  <div class="step"><div class="circle">3</div><div>Plano de fundo</div></div>
  <div class="step"><div class="circle">✓</div><div>Conclusão</div></div>
</div>

<section class="section">

  <label class="label">Nome do layout</label>
  <input id="layoutName" class="input" type="text">

  <label class="label">Localização do logo</label>
  <select id="logoPosition" class="select">
    <option>ESQUERDA</option>
    <option>CENTRO</option>
    <option>DIREITA</option>
  </select>

  <label class="label">Botões bloqueados</label>
  <select id="buttonsLocked" class="select">
    <option>NÃO</option>
    <option>SIM</option>
  </select>
  <div class="help">Use esta opção apenas se desejar bloquear os botões.</div>

  <label class="label">Senha para desbloquear</label>
  <input id="unlockPassword" class="input" type="text">
  <div class="help">Mínimo 5 caracteres.</div>

  <label class="label">Exibir APPS</label>
  <select id="showApps" class="select">
    <option>SIM</option>
    <option>NÃO</option>
  </select>

  <!-- NOVAS CONFIGS (IGUAL PRINT) -->

  <label class="label">Tamanho dos ícones</label>
  <select id="iconSize" class="select">
    <option>PADRÃO</option>
    <option>GRANDE</option>
    <option>PEQUENO</option>
  </select>

  <label class="label">Tamanho da data e hora</label>
  <select id="clockSize" class="select">
    <option>PADRÃO</option>
    <option>GRANDE</option>
    <option>PEQUENO</option>
  </select>

  <label class="label">Tamanho data de expiração</label>
  <select id="expireSize" class="select">
    <option>PADRÃO</option>
    <option>GRANDE</option>
    <option>PEQUENO</option>
  </select>

  <label class="label">Posição dos banners</label>
  <select id="bannerPosition" class="select">
    <option>ESQUERDA</option>
    <option>DIREITA</option>
  </select>

  <label class="label">Posição da data e hora</label>
  <select id="datePosition" class="select">
    <option>ESQUERDA</option>
    <option>DIREITA</option>
  </select>

  <label class="label">Tempo de troca dos banners</label>
  <select id="bannerInterval" class="select">
    <option value="5">5 segundos</option>
    <option value="10">10 segundos</option>
    <option value="15">15 segundos</option>
  </select>

  <label class="label">Ativar update automático?</label>
  <select id="autoUpdate" class="select">
    <option>NÃO</option>
    <option>SIM</option>
  </select>

  <button class="btn" onclick="goStep2()">Prosseguir >>></button>

</section>

<script>
function goStep2() {
  const data = {
    name: document.getElementById('layoutName').value,
    logoPosition: document.getElementById('logoPosition').value,
    buttonsLocked: document.getElementById('buttonsLocked').value,
    unlockPassword: document.getElementById('unlockPassword').value,
    showApps: document.getElementById('showApps').value,

    iconSize: document.getElementById('iconSize').value,
    clockSize: document.getElementById('clockSize').value,
    expireSize: document.getElementById('expireSize').value,
    bannerPosition: document.getElementById('bannerPosition').value,
    datePosition: document.getElementById('datePosition').value,
    bannerInterval: document.getElementById('bannerInterval').value,
    autoUpdate: document.getElementById('autoUpdate').value
  };

  localStorage.setItem('layout_step1', JSON.stringify(data));

  window.location.href = 'addlayout-step2.html'; // próxima etapa
}
</script>

</body>
</html>
