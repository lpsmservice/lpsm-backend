<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Editar Layout</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(90deg,#02101e,#052444);
  color:#fff;
}

/* TOPO */
.topbar{
  background:#2f7cff;
  padding:16px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  position:sticky;
  top:0;
}

/* PASSOS */
.steps{
  display:flex;
  justify-content:space-around;
  background:#0d1f3b;
  padding:12px 0;
}

.step{
  text-align:center;
  color:#6d7f98;
}

.step.active{
  color:#fff;
}

.circle{
  width:26px;
  height:26px;
  border-radius:50%;
  background:#213552;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  margin-bottom:5px;
}

.step.active .circle{
  background:#2f7cff;
}

/* CONTEUDO */
.container{
  padding:20px;
  max-width:900px;
  margin:auto;
}

label{
  display:block;
  margin-top:15px;
  margin-bottom:5px;
  color:#aebed4;
}

input,select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#1c2e49;
  color:#fff;
}

.info{
  font-size:13px;
  color:#9fb1cb;
  margin-top:5px;
  line-height:1.4;
}

button{
  width:100%;
  margin-top:20px;
  padding:14px;
  border:none;
  border-radius:6px;
  background:#2f7cff;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

.section{display:none;}
.section.active{display:block;}
</style>
</head>

<body>

<div class="topbar">Editar layout</div>

<div class="steps">
  <div class="step active"><div class="circle">1</div>Dados</div>
  <div class="step"><div class="circle">2</div>Logomarca</div>
  <div class="step"><div class="circle">3</div>Plano</div>
  <div class="step"><div class="circle">✔</div>Final</div>
</div>

<div class="container">

<!-- STEP 1 -->
<div id="s1" class="section active">

<label>Nome do layout</label>
<input id="name">

<label>Localização do logo</label>
<select id="logoPosition">
<option>ESQUERDA</option>
<option>CENTRO</option>
<option>DIREITA</option>
</select>

<label>Botões bloqueados</label>
<select id="blocked">
<option>NÃO</option>
<option>SIM</option>
</select>
<div class="info">
Ideal para locação de aparelhos.
</div>

<label>Senha para desbloquear</label>
<input id="password">
<div class="info">
Mínimo 5 caracteres.
</div>

<label>Exibir APPS</label>
<select id="showApps">
<option>SIM</option>
<option>NÃO</option>
</select>

<label>Tamanho dos ícones</label>
<select id="iconSize">
<option>PADRÃO</option>
<option>PEQUENO</option>
<option>GRANDE</option>
</select>

<label>Tamanho da data e hora</label>
<select id="clockSize">
<option>PADRÃO</option>
<option>PEQUENO</option>
<option>GRANDE</option>
</select>

<label>Tamanho da data expiração</label>
<select id="expireSize">
<option>PADRÃO</option>
<option>PEQUENO</option>
<option>GRANDE</option>
</select>

<label>Posição dos banners</label>
<select id="bannerPosition">
<option>ESQUERDA</option>
<option>DIREITA</option>
</select>

<label>Posição da data e hora</label>
<select id="clockPosition">
<option>ESQUERDA</option>
<option>DIREITA</option>
</select>

<label>Tempo troca banners</label>
<input id="bannerTime" value="5">

<label>Update automático</label>
<select id="autoUpdate">
<option>NÃO</option>
<option>SIM</option>
</select>

<button onclick="next()">Prosseguir >>></button>
</div>

<!-- STEP 2 -->
<div id="s2" class="section">
<label>URL da logo</label>
<input id="logoUrl">
<button onclick="next()">Prosseguir >>></button>
</div>

<!-- STEP 3 -->
<div id="s3" class="section">
<label>URL do fundo</label>
<input id="background">
<button onclick="next()">Prosseguir >>></button>
</div>

<!-- STEP 4 -->
<div id="s4" class="section">
<button onclick="salvar()">SALVAR LAYOUT</button>
</div>

</div>

<script>

const API = window.location.origin;
let step=1;

function next(){
  document.getElementById('s'+step).classList.remove('active');
  step++;
  document.getElementById('s'+step).classList.add('active');
}

async function salvar(){

  const body={
    name:name.value,
    logoPosition:logoPosition.value,
    buttonsLocked:blocked.value==="SIM",
    unlockPassword:password.value,
    showAppsButton:showApps.value==="SIM",
    iconSize:iconSize.value,
    clockSize:clockSize.value,
    expireSize:expireSize.value,
    bannerPosition:bannerPosition.value,
    datePosition:clockPosition.value,
    bannerInterval:Number(bannerTime.value),
    autoUpdate:autoUpdate.value==="SIM",
    logo:logoUrl.value,
    background:background.value
  };

  await fetch(API+'/layouts',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });

  alert('Layout salvo!');
  location.href='layouts.html';
}

</script>

</body>
</html>
