<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Editar Layout</title>

<style>
body {
  background: #0b1b2b;
  color: #fff;
  font-family: Arial;
  margin: 0;
}

.topbar {
  background: #2d7ef7;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
}

.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

h2 {
  margin-top: 0;
}

.input-group {
  margin-bottom: 15px;
}

label {
  display: block;
  margin-bottom: 5px;
  font-size: 14px;
  color: #ccc;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: none;
  background: #1c2b3c;
  color: #fff;
}

button {
  width: 100%;
  padding: 15px;
  background: #2d7ef7;
  border: none;
  color: #fff;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 15px;
  font-size: 16px;
}

.steps {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.step {
  flex: 1;
  text-align: center;
  opacity: 0.4;
}

.step.active {
  opacity: 1;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="topbar">Editar layout</div>

<div class="container">

<div class="steps">
  <div class="step active">1 - Dados</div>
  <div class="step">2 - Logomarca</div>
  <div class="step">3 - Plano de fundo</div>
  <div class="step">✔ Conclusão</div>
</div>

<!-- STEP 1 -->
<div id="step1">

  <div class="input-group">
    <label>Nome do layout</label>
    <input id="name">
  </div>

  <div class="input-group">
    <label>Localização do logo</label>
    <select id="logoPosition">
      <option>ESQUERDA</option>
      <option>DIREITA</option>
      <option>CENTRO</option>
    </select>
  </div>

  <div class="input-group">
    <label>Botões bloqueados</label>
    <select id="blocked">
      <option>NÃO</option>
      <option>SIM</option>
    </select>
  </div>

  <div class="input-group">
    <label>Senha para desbloquear</label>
    <input id="password">
  </div>

  <div class="input-group">
    <label>Exibir apps</label>
    <select id="showApps">
      <option>SIM</option>
      <option>NÃO</option>
    </select>
  </div>

  <div class="input-group">
    <label>Tamanho dos ícones</label>
    <select id="iconSize">
      <option>PADRÃO</option>
      <option>PEQUENO</option>
      <option>GRANDE</option>
    </select>
  </div>

  <div class="input-group">
    <label>Tamanho da data e hora</label>
    <select id="clockSize">
      <option>PADRÃO</option>
      <option>PEQUENO</option>
      <option>GRANDE</option>
    </select>
  </div>

  <div class="input-group">
    <label>Tamanho da data de expiração</label>
    <select id="expireSize">
      <option>PADRÃO</option>
      <option>PEQUENO</option>
      <option>GRANDE</option>
    </select>
  </div>

  <div class="input-group">
    <label>Posição dos banners</label>
    <select id="bannerPosition">
      <option>ESQUERDA</option>
      <option>DIREITA</option>
    </select>
  </div>

  <div class="input-group">
    <label>Posição da data e hora</label>
    <select id="clockPosition">
      <option>ESQUERDA</option>
      <option>DIREITA</option>
    </select>
  </div>

  <div class="input-group">
    <label>Tempo de troca dos banners</label>
    <input id="bannerTime" value="5">
  </div>

  <div class="input-group">
    <label>Ativar update automático?</label>
    <select id="autoUpdate">
      <option>NÃO</option>
      <option>SIM</option>
    </select>
  </div>

  <button onclick="nextStep()">Prosseguir >>></button>

</div>

<!-- STEP 2 -->
<div id="step2" style="display:none;">
  <h2>Logomarca</h2>

  <div class="input-group">
    <label>URL da logo</label>
    <input id="logoUrl">
  </div>

  <button onclick="nextStep()">Prosseguir >>></button>
</div>

<!-- STEP 3 -->
<div id="step3" style="display:none;">
  <h2>Plano de fundo</h2>

  <div class="input-group">
    <label>URL do fundo</label>
    <input id="background">
  </div>

  <button onclick="nextStep()">Prosseguir >>></button>
</div>

<!-- STEP 4 -->
<div id="step4" style="display:none;">
  <h2>Conclusão</h2>

  <button onclick="salvar()">SALVAR LAYOUT</button>
</div>

</div>

<script>

const API = window.location.origin;
let step = 1;

function nextStep() {
  document.getElementById('step' + step).style.display = 'none';
  step++;
  document.getElementById('step' + step).style.display = 'block';
}

async function salvar() {

  const body = {
    name: document.getElementById('name').value,
    logoPosition: document.getElementById('logoPosition').value,
    blocked: document.getElementById('blocked').value,
    password: document.getElementById('password').value,
    showApps: document.getElementById('showApps').value,
    iconSize: document.getElementById('iconSize').value,
    clockSize: document.getElementById('clockSize').value,
    expireSize: document.getElementById('expireSize').value,
    bannerPosition: document.getElementById('bannerPosition').value,
    clockPosition: document.getElementById('clockPosition').value,
    bannerTime: document.getElementById('bannerTime').value,
    autoUpdate: document.getElementById('autoUpdate').value,
    logoUrl: document.getElementById('logoUrl').value,
    background: document.getElementById('background').value
  };

  await fetch(API + '/layouts', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });

  alert('Layout salvo!');
  window.location.href = 'layouts.html';
}

</script>

</body>
</html>
