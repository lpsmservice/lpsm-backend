<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Adicionar Layout</title>

<style>
body {
  background:#0b1b2b;
  color:#fff;
  font-family:Arial;
  margin:0;
}

.container {
  padding:20px;
}

input, select {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:none;
}

button {
  width:100%;
  padding:14px;
  background:#2d7ef7;
  border:none;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
  gap:15px;
  margin-top:20px;
}

.card {
  background:#111;
  padding:10px;
  border-radius:10px;
  text-align:center;
}
.card img {
  width:100%;
  height:130px;
  object-fit:cover;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<!-- ETAPA 1 -->
<div id="step1">
  <h2>Dados do layout</h2>

  <input id="nome" placeholder="Nome do layout">

  <select id="logoPos">
    <option>ESQUERDA</option>
    <option>CENTRO</option>
    <option>DIREITA</option>
  </select>

  <select id="bloqueado">
    <option>NÃO</option>
    <option>SIM</option>
  </select>

  <input id="senha" placeholder="Senha (opcional)">

  <select id="apps">
    <option>SIM</option>
    <option>NÃO</option>
  </select>

  <button onclick="proximo1()">Prosseguir >>></button>
</div>

<!-- ETAPA 2 -->
<div id="step2" style="display:none;">
  <h2>Logomarca</h2>

  <input type="file" id="logoInput">

  <br>
  <img id="previewLogo" style="max-width:200px; display:none; margin-top:10px;">

  <button onclick="proximo2()">Prosseguir >>></button>
</div>

<!-- ETAPA 3 -->
<div id="step3" style="display:none;">
  <h2>Escolha o plano de fundo</h2>

  <div id="fundosGrid" class="grid"></div>

  <button onclick="irConclusao()">Prosseguir >>></button>
</div>

<!-- ETAPA 4 -->
<div id="step4" style="display:none;">
  <h2>Conclusão</h2>

  <div id="resumo"></div>

  <button onclick="salvar()">SALVAR LAYOUT</button>
</div>

</div>

<script>

const API = window.location.origin;

let fundoSelecionado = null;
let logoBase64 = null;

// ================= ETAPA 1
function proximo1() {
  const nome = document.getElementById('nome').value;

  if (!nome) {
    alert('Digite o nome');
    return;
  }

  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
}

// ================= ETAPA 2
document.getElementById('logoInput').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    logoBase64 = ev.target.result;
    const img = document.getElementById('previewLogo');
    img.src = logoBase64;
    img.style.display = 'block';
  };
  reader.readAsDataURL(file);
};

function proximo2() {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'block';

  carregarFundos();
}

// ================= ETAPA 3
async function carregarFundos() {
  const res = await fetch(API + '/backgrounds');
  const data = await res.json();

  const el = document.getElementById('fundosGrid');

  el.innerHTML = data.map(item => `
    <div class="card">

      <img src="${item.imagem}">

      <p>${item.nome}</p>

      <button onclick="selecionarFundo('${item.imagem}', this)">
        Escolher
      </button>

    </div>
  `).join('');
}

function selecionarFundo(img, btn) {
  fundoSelecionado = img;

  document.querySelectorAll('#fundosGrid button').forEach(b => {
    b.style.background = '#2d7ef7';
  });

  btn.style.background = 'green';
}

function irConclusao() {
  if (!fundoSelecionado) {
    alert('Escolha um fundo');
    return;
  }

  document.getElementById('step3').style.display = 'none';
  document.getElementById('step4').style.display = 'block';

  montarResumo();
}

// ================= ETAPA 4
function montarResumo() {
  document.getElementById('resumo').innerHTML = `
    <p><b>Nome:</b> ${nome.value}</p>
    <p><b>Logo:</b> ${logoBase64 ? 'Sim' : 'Não'}</p>
    <p><b>Fundo:</b></p>
    <img src="${fundoSelecionado}" style="max-width:200px">
  `;
}

// ================= SALVAR
async function salvar() {

  const body = {
    name: nome.value,
    logo: logoBase64,
    background: fundoSelecionado
  };

  await fetch(API + '/layouts', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });

  alert('Layout salvo!');
  window.location.href = 'layouts.html';
}

</script>

</body>
</html>
