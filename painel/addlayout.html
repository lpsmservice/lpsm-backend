<html lang="pt-BR">
<body>

<h2>Criar Layout</h2>

<!-- ETAPA 1 -->
<div id="step1">
  <h3>Escolha o fundo</h3>

  <div id="fundos"></div>

  <button onclick="proximo()">Prosseguir</button>
</div>

<!-- ETAPA 2 (ainda não vamos mexer) -->
<div id="step2" style="display:none;">
  <h3>Etapa 2 (logo)</h3>
</div>

<script>
const API = window.location.origin;

let fundoSelecionado = null;

// =====================
// CARREGAR FUNDOS
// =====================
async function carregarFundos() {
  try {
    const res = await fetch(API + '/backgrounds');
    const data = await res.json();

    const el = document.getElementById('fundos');

    if (!data.length) {
      el.innerHTML = 'Nenhum fundo disponível';
      return;
    }

    el.innerHTML = data.map(item => `
      <img 
        src="${item.imagem}" 
        width="150"
        style="margin:10px;cursor:pointer;border:3px solid transparent"
        onclick="selecionarFundo('${item.imagem}', this)"
      >
    `).join('');

  } catch (err) {
    console.error(err);
  }
}

// =====================
// SELECIONAR FUNDO
// =====================
function selecionarFundo(img, el) {
  fundoSelecionado = img;

  document.querySelectorAll('#fundos img').forEach(i => {
    i.style.border = '3px solid transparent';
  });

  el.style.border = '3px solid green';
}

// =====================
// PROSSEGUIR
// =====================
function proximo() {
  if (!fundoSelecionado) {
    alert('Escolha um fundo primeiro');
    return;
  }

  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
}

// =====================
window.onload = carregarFundos;
</script>

</body>
</html>
