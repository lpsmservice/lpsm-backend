<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launcher</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

#bg{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

.top{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.apps{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  padding:20px;
}

.app{
  text-align:center;
}

.app img{
  width:60px;
  height:60px;
}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
</style>
</head>

<body>

<img id="bg">

<div class="top">
  <div id="logo"></div>
  <div id="hora"></div>
</div>

<div id="apps" class="apps"></div>

<div class="bottom">
  <div>🏠</div>
  <div>📦</div>
  <div>⬆️</div>
</div>

<script>
const API = window.location.origin;

// ⚠️ depois vamos automatizar isso
const DEVICE_CODE = "TESTE123";

async function carregar(){
  try{
    const res = await fetch(API + "/launcher/device/" + DEVICE_CODE);
    const data = await res.json();

    if(data.layout && data.layout.background){
      document.getElementById("bg").src = data.layout.background;
    }

    if(data.layout && data.layout.logo){
      document.getElementById("logo").innerHTML =
        `<img src="${data.layout.logo}" height="40">`;
    }

    const container = document.getElementById("apps");
    container.innerHTML = "";

    (data.apps || []).forEach(app=>{
      const div = document.createElement("div");
      div.className = "app";
      div.innerHTML = `
        <img src="${app.icon}">
        <div>${app.name}</div>
      `;
      container.appendChild(div);
    });

  }catch(e){
    console.log(e);
  }
}

setInterval(()=>{
  document.getElementById("hora").innerText =
    new Date().toLocaleTimeString();
},1000);

carregar();
</script>

</body>
</html>
